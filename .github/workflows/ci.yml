name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Debug workspace
        shell: cmd
        run: |
          echo CD=%CD%
          where mvn
          echo ---mvn -v---
          mvn -v
          echo AFTER_MVN_ERR=%errorlevel%
          echo ---call mvnw.cmd -v---
          call mvnw.cmd -v
          echo AFTER_MVNW_ERR=%errorlevel%

      - name: Maven compile
        shell: cmd
        run: mvnw.cmd clean compile

      - name: Java tests (mvnw.cmd test)
        shell: cmd
        run: mvnw.cmd test

      - name: Build Swing (build.bat, Maven 不要パス)
        shell: cmd
        run: build.bat

      - name: Build JavaFX (build.bat --javafx)
        shell: cmd
        run: build.bat --javafx

      - name: Python AI tests
        run: python -m unittest discover -s ai -p "test_*.py" -v

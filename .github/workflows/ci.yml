name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.azure/**'
      - 'LICENSE'
      - 'ChessGame.code-workspace'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.azure/**'
      - 'LICENSE'
      - 'ChessGame.code-workspace'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # UTC 月曜 00:00 = JST 月曜 09:00

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  linux:
    name: Linux (compile + test, exe パッケージングなし)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Java tests (./mvnw test)
        run: ./mvnw test

      - name: Build Swing (build.sh, コンパイルのみ)
        run: ./build.sh

      - name: Build JavaFX (build.sh --javafx, コンパイルのみ)
        run: ./build.sh --javafx

      - name: Python AI tests
        run: python -m unittest discover -s ai -p "test_*.py" -v

  windows:
    name: Windows (compile + test + exe パッケージング)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Maven compile
        shell: cmd
        run: call mvnw.cmd clean compile

      - name: Java tests (mvnw.cmd test)
        shell: cmd
        run: call mvnw.cmd test

      - name: Build Swing (build.bat, exe パッケージングまで)
        shell: cmd
        run: call build.bat

      - name: Build JavaFX (build.bat --javafx, exe パッケージングまで)
        shell: cmd
        run: call build.bat --javafx

      - name: Python AI tests
        run: python -m unittest discover -s ai -p "test_*.py" -v

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: "Java: Checkstyle"
        continue-on-error: true
        run: ./mvnw checkstyle:check

      - name: "Java: PMD"
        continue-on-error: true
        run: ./mvnw pmd:check

      - name: "Python: Ruff"
        continue-on-error: true
        run: |
          pip install ruff
          ruff check ai

      - name: "Python: Bandit"
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r ai -x "*/test_*.py"

      - name: Gitleaks
        continue-on-error: true
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v

  weekly-audit:
    name: Weekly Dependency & Secret Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy dependency scan (pom.xml)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v

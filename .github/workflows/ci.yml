name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.azure/**'
      - 'LICENSE'
      - 'ChessGame.code-workspace'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - '.azure/**'
      - 'LICENSE'
      - 'ChessGame.code-workspace'
      - '.gitignore'

jobs:
  linux:
    name: Linux (compile + test, exe パッケージングなし)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Java tests (./mvnw test)
        run: ./mvnw test

      - name: Build Swing (build.sh, コンパイルのみ)
        run: ./build.sh

      - name: Build JavaFX (build.sh --javafx, コンパイルのみ)
        run: ./build.sh --javafx

      - name: Python AI tests
        run: python -m unittest discover -s ai -p "test_*.py" -v

  windows:
    name: Windows (compile + test + exe パッケージング)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Maven compile
        shell: cmd
        run: call mvnw.cmd clean compile

      - name: Java tests (mvnw.cmd test)
        shell: cmd
        run: call mvnw.cmd test

      - name: Build Swing (build.bat, exe パッケージングまで)
        shell: cmd
        run: call build.bat

      - name: Build JavaFX (build.bat --javafx, exe パッケージングまで)
        shell: cmd
        run: call build.bat --javafx

      - name: Python AI tests
        run: python -m unittest discover -s ai -p "test_*.py" -v
